[CHEMINS]
; Dossier principal du workflow (contient les sous-dossiers Entrant/Traite/Erreur).
; Laisser vide = dossier du script / de l'exe.
BASE_DIR = Z:\NZBG\échéanciers\Workflow factures ventes

; Noms des sous-dossiers (personnalisables sans modifier le code)
FOLDER_ENTRANT = 1_Entrant_Deposer_PDF
FOLDER_TRAITE  = 2_Traite_Succes
FOLDER_ERREUR  = 3_Erreur_A_Verifier

; Fichier Excel echéancier cible
EXCEL_FILE = Z:\NZBG\échéanciers\Echeancier_cible.xlsx

; Chemin complet vers tesseract.exe
TESSERACT_PATH = C:\Tesseract-OCR\tesseract.exe

[PARAMETRES]
; Score minimum (0-10) pour injection automatique sans validation humaine.
SEUIL_CONFIANCE = 7

; Nombre maximum d'entrées conservées dans workflow.json (rotation automatique).
MAX_ENTREES_LOG = 500
